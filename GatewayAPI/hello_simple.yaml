apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
spec:
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      initContainers:
        - name: init-html
          image: busybox
          command:
            - sh
            - -c
            - echo "hello-app greeting" > /usr/share/nginx/html/index.html
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      containers:
        - name: hello-app-container
          image: nginx
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - emptyDir: {}
          name: html
---
apiVersion: v1
kind: Service
metadata:
  name: hello-app
spec:
  selector:
    app: hello-app
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: hello-app
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: selfsigned-gateway
      namespace: selfsigned-gateway
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: hello-app
          port: 80
          weight: 1
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              replaceFullPath: /
              type: ReplaceFullPath
      matches:
        - path:
            type: PathPrefix
            value: /helloapp